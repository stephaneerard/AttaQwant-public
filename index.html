<style>
  :root {
    --sidebar-w: 300px;
    --bg: #0d1117;
    --bg-sidebar: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --accent-hover: #79c0ff;
    --hover-bg: #1f2937;
    --active-bg: #1c2533;
  }
  html.light {
    --bg: #ffffff;
    --bg-sidebar: #f6f8fa;
    --border: #d0d7de;
    --text: #1f2328;
    --text-muted: #656d76;
    --accent: #0969da;
    --accent-hover: #0550ae;
    --hover-bg: #eaeef2;
    --active-bg: #ddf4ff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* --- Custom scrollbars --- */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 4px;
    border: 2px solid transparent;
    background-clip: padding-box;
  }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); background-clip: padding-box; }
  ::-webkit-scrollbar-corner { background: transparent; }
  /* Firefox */
  * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* --- Sidebar --- */
  #sidebar {
    width: var(--sidebar-w);
    min-width: 0;
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: margin-left .25s ease;
    flex-shrink: 0;
  }
  #sidebar.collapsed { margin-left: calc(var(--sidebar-w) * -1); }

  /* --- Resize handle --- */
  #sidebar-resizer {
    width: 4px;
    cursor: col-resize;
    background: transparent;
    flex-shrink: 0;
    transition: background .15s;
    z-index: 10;
  }
  #sidebar-resizer:hover, #sidebar-resizer.dragging {
    background: var(--accent);
  }
  #sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  #sidebar-logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  #sidebar-logo svg { flex-shrink: 0; }
  #sidebar-logo .logo-text {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.5px;
  }
  #sidebar-logo .logo-text .q { color: #d4145a; }
  #sidebar-sep {
    height: 1px;
    background: linear-gradient(90deg, #5c97bf, #59c4b1, #d4145a, #f0ad4e, #8e44ad);
    border: none;
  }
  #sidebar-title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  #sidebar-header h1 {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    line-height: 1.3;
    flex: 1;
  }
  #sidebar-controls { display: flex; gap: 4px; }
  #sidebar-controls button, #toggle-sidebar {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    cursor: pointer;
    border-radius: 6px;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: all .15s;
  }
  #sidebar-controls button:hover, #toggle-sidebar:hover {
    color: var(--text);
    background: var(--hover-bg);
  }
  #toc {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }
  #toc ul { list-style: none; }
  #toc li { position: relative; }
  #toc .toc-group-label {
    display: block;
    padding: 6px 16px 4px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: var(--text-muted);
    margin-top: 8px;
    cursor: pointer;
    user-select: none;
  }
  #toc .toc-group-label:hover { color: var(--text); }
  #toc .toc-group-label::before {
    content: '\25BE';
    display: inline-block;
    margin-right: 6px;
    transition: transform .15s;
    font-size: 10px;
  }
  #toc .toc-group.collapsed > .toc-group-label::before { transform: rotate(-90deg); }
  #toc .toc-group.collapsed > ul { display: none; }
  #toc a {
    display: block;
    padding: 5px 16px 5px 24px;
    color: var(--text-muted);
    text-decoration: none;
    font-size: 13px;
    border-left: 2px solid transparent;
    transition: all .15s;
  }
  /* Progressive indentation by depth */
  #toc [data-depth="1"] > a, #toc [data-depth="1"] > div > a { padding-left: 28px; }
  #toc [data-depth="2"] > a, #toc [data-depth="2"] > div > a { padding-left: 40px; font-size: 12px; }
  #toc [data-depth="3"] > a, #toc [data-depth="3"] > div > a { padding-left: 52px; font-size: 12px; }
  #toc [data-depth="4"] > a, #toc [data-depth="4"] > div > a { padding-left: 64px; font-size: 11px; }
  #toc [data-depth="5"] > a, #toc [data-depth="5"] > div > a { padding-left: 76px; font-size: 11px; }
  #toc a:hover { color: var(--text); background: var(--hover-bg); }
  #toc a.active {
    color: var(--accent);
    border-left-color: var(--accent);
    background: var(--active-bg);
    font-weight: 500;
  }

  /* --- Main pane --- */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }
  #topbar {
    display: flex;
    align-items: center;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    gap: 8px;
    background: var(--bg-sidebar);
    flex-shrink: 0;
  }
  #toggle-sidebar { flex-shrink: 0; }
  #breadcrumb {
    flex: 1;
    font-size: 12px;
    color: var(--text-muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #content-wrapper {
    flex: 1;
    overflow-y: auto;
    scroll-behavior: smooth;
  }
  #content {
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 40px 80px;
  }

  /* Markdown overrides */
  .markdown-body {
    background: transparent !important;
    color: var(--text) !important;
    --bgColor-default: transparent;
    --bgColor-muted: var(--bg-sidebar);
    --borderColor-default: var(--border);
    --borderColor-muted: var(--border);
    --fgColor-default: var(--text);
    --fgColor-muted: var(--text-muted);
  }
  .markdown-body table { display: table; width: 100%; }
  .markdown-body th, .markdown-body td {
    border-color: var(--border) !important;
    background: transparent !important;
    color: var(--text) !important;
  }
  .markdown-body tr { background: transparent !important; }
  .markdown-body tr:nth-child(2n) { background: var(--bg-sidebar) !important; }
  .markdown-body th { background: var(--bg-sidebar) !important; }
  .markdown-body hr { border-color: var(--border); }
  .markdown-body a { color: var(--accent); }
  .markdown-body strong { color: var(--text); }
  .markdown-body code, .markdown-body pre {
    background: var(--bg-sidebar) !important;
    color: var(--text) !important;
  }
  .markdown-body h1, .markdown-body h2, .markdown-body h3,
  .markdown-body h4, .markdown-body h5, .markdown-body h6 {
    position: relative;
    color: var(--text) !important;
  }
  .heading-link {
    position: absolute;
    left: -1.5em;
    color: var(--text-muted) !important;
    text-decoration: none !important;
    font-weight: 400;
    opacity: 0;
    transition: opacity .15s;
  }
  .markdown-body h1:hover .heading-link,
  .markdown-body h2:hover .heading-link,
  .markdown-body h3:hover .heading-link,
  .markdown-body h4:hover .heading-link,
  .markdown-body h5:hover .heading-link,
  .markdown-body h6:hover .heading-link { opacity: 1; }

  /* --- Mermaid container --- */
  .mermaid-wrapper {
    position: relative;
    margin: 16px 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    background: #0d1117;
  }
  html.light .mermaid-wrapper { background: #fff; }
  .mermaid-toolbar {
    position: absolute;
    top: 8px;
    right: 8px;
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity .2s;
    z-index: 2;
  }
  .mermaid-wrapper:hover .mermaid-toolbar { opacity: 1; }
  .mermaid-toolbar button {
    background: var(--bg-sidebar);
    border: 1px solid var(--border);
    color: var(--text-muted);
    cursor: pointer;
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 11px;
    transition: all .15s;
  }
  .mermaid-toolbar button:hover { color: var(--text); background: var(--hover-bg); }
  .mermaid-viewport {
    overflow: auto;
    padding: 24px;
    cursor: grab;
    min-height: 100px;
  }
  .mermaid-viewport:active { cursor: grabbing; }
  .mermaid-viewport svg { transition: transform .1s ease-out; transform-origin: 0 0; }

  /* --- Fullscreen overlay --- */
  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.85);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }
  #overlay.visible { display: flex; }
  #overlay-inner {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    max-width: 95vw;
    max-height: 95vh;
    overflow: auto;
    padding: 32px;
    position: relative;
  }
  #overlay-close {
    position: absolute;
    top: 12px;
    right: 12px;
    background: var(--bg-sidebar);
    border: 1px solid var(--border);
    color: var(--text);
    cursor: pointer;
    border-radius: 6px;
    width: 32px;
    height: 32px;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* --- PDF embed --- */
  .pdf-embed {
    width: 100%;
    height: calc(100vh - 80px);
    border: none;
    border-radius: 8px;
  }

  /* --- Loading --- */
  #loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 200px;
    color: var(--text-muted);
    font-size: 14px;
  }
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .6s linear infinite;
    margin-right: 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* --- Responsive --- */
  @media (max-width: 768px) {
    #sidebar { position: fixed; z-index: 100; height: 100vh; }
    #sidebar.collapsed { margin-left: calc(var(--sidebar-w) * -1); }
    #content { padding: 20px 16px 60px; }
  }
</style>
</head>

<nav id="sidebar">
  <div id="sidebar-header">
    <div id="sidebar-logo">
      <svg width="28" height="28" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <rect width="32" height="32" rx="6" fill="#0d1117"/>

        <rect x="6.4" y="0" width="6.4" height="3" fill="#59c4b1"/>
        <rect x="12.8" y="0" width="6.4" height="3" fill="#d4145a"/>
        <rect x="19.2" y="0" width="6.4" height="3" fill="#f0ad4e"/>
        <rect x="25.6" y="0" width="6.4" height="3" fill="#8e44ad"/>
        <text x="16" y="24" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="700" fill="#e6edf3">A<tspan fill="#d4145a">Q</tspan></text>

<div id="sidebar-resizer"></div>

<div id="main">
  <div id="topbar">
    <button id="toggle-sidebar" title="Sommaire">&#9776;</button>
    <div id="breadcrumb"></div>
  </div>
  <div id="content-wrapper">
    <div id="content" class="markdown-body">
      <div id="loading"><div class="spinner"></div>Chargement du manifest...</div>
    </div>

<div id="overlay">
  <div id="overlay-inner">
    <button id="overlay-close">&times;</button>
    <div id="overlay-content"></div>
  </div>
</div>

<script>
(function() {
  'use strict';

  // --- State ---
  let tocData = null;  // toc.json content
  let currentFile = null;
  let fileCache = {};
  let basePath = '';

  // --- DOM refs ---
  const $ = id => document.getElementById(id);
  const tocEl       = $('toc');
  const contentEl   = $('content');
  const titleEl     = $('app-title');
  const breadcrumb  = $('breadcrumb');
  const sidebar     = $('sidebar');
  const overlay     = $('overlay');
  const overlayInner = $('overlay-inner');
  const overlayContent = $('overlay-content');

  // --- Sidebar resize (drag handle + localStorage) ---
  const resizer = $('sidebar-resizer');
  const savedWidth = localStorage.getItem('sidebar-width');
  if (savedWidth) {
    const w = parseInt(savedWidth, 10);
    if (w >= 150 && w <= 800) {
      document.documentElement.style.setProperty('--sidebar-w', w + 'px');
    }
  }

  (function initResizer() {
    let startX, startW;
    resizer.addEventListener('mousedown', e => {
      e.preventDefault();
      startX = e.clientX;
      startW = sidebar.getBoundingClientRect().width;
      resizer.classList.add('dragging');
      sidebar.style.transition = 'none';
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
    function onMove(e) {
      const w = Math.min(800, Math.max(150, startW + (e.clientX - startX)));
      document.documentElement.style.setProperty('--sidebar-w', w + 'px');
    }
    function onUp() {
      resizer.classList.remove('dragging');
      sidebar.style.transition = '';
      const w = Math.round(sidebar.getBoundingClientRect().width);
      localStorage.setItem('sidebar-width', w);
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
  })();

  // --- Mermaid init ---
  mermaid.initialize({
    startOnLoad: false,
    theme: 'dark',
    securityLevel: 'loose',
    fontFamily: 'inherit'
  });

  // --- Theme ---
  const savedTheme = localStorage.getItem('theme');
  if (savedTheme === 'light') document.documentElement.classList.add('light');

  $('btn-theme').addEventListener('click', () => {
    document.documentElement.classList.toggle('light');
    const isLight = document.documentElement.classList.contains('light');
    localStorage.setItem('theme', isLight ? 'light' : 'dark');
    mermaid.initialize({ startOnLoad: false, theme: isLight ? 'default' : 'dark', securityLevel: 'loose', fontFamily: 'inherit' });
    if (currentFile) renderCurrentContent();
  });

  // --- Sidebar toggle ---
  $('toggle-sidebar').addEventListener('click', () => sidebar.classList.toggle('collapsed'));

  // --- Overlay ---
  $('overlay-close').addEventListener('click', closeOverlay);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeOverlay(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeOverlay(); });
  function closeOverlay() { overlay.classList.remove('visible'); overlayContent.innerHTML = ''; }

  // --- TOC loading ---
  async function init() {
    try {
      const resp = await fetch('toc.json');
      tocData = await resp.json();
    } catch (e) {
      contentEl.innerHTML = '<p style="color:#f85149">Erreur : impossible de charger toc.json</p>';
      return;
    }
    document.title = tocData.name;
    titleEl.textContent = tocData.name;
    buildToc(tocData.toc, tocEl, 0);
    handleHash();
    window.addEventListener('hashchange', handleHash);
  }

  // --- TOC builder (recursive, array-based { name, path?, children? }) ---
  function buildToc(items, parent, depth) {
    if (!Array.isArray(items)) return;
    const ul = document.createElement('ul');
    for (const item of items) {
      const li = document.createElement('li');
      li.dataset.depth = depth;
      const hasChildren = item.children && item.children.length > 0;
      const hasPath = !!item.path;

      if (hasChildren) {
        // Group or document with sub-headings
        li.classList.add('toc-group');

        if (hasPath) {
          // Document node: start collapsed (opened via updateActiveToc when anchor matches)
          li.classList.add('collapsed');

          const wrapper = document.createElement('div');
          wrapper.style.display = 'flex';
          wrapper.style.alignItems = 'center';

          const toggle = document.createElement('span');
          toggle.classList.add('toc-group-toggle');
          toggle.textContent = '\u25BE';
          toggle.style.cssText = 'cursor:pointer;padding:4px 6px;font-size:10px;color:var(--text-muted);transition:transform .15s;display:inline-block;';
          toggle.style.transform = 'rotate(-90deg)';
          toggle.addEventListener('click', e => {
            e.stopPropagation();
            li.classList.toggle('collapsed');
            toggle.style.transform = li.classList.contains('collapsed') ? 'rotate(-90deg)' : '';
          });

          const a = document.createElement('a');
          a.textContent = item.name;
          a.href = '#' + item.path;
          a.dataset.file = fileFromPath(item.path);
          a.dataset.path = item.path;
          a.style.flex = '1';
          a.addEventListener('click', e => {
            e.preventDefault();
            navigateToPath(item.path);
          });

          wrapper.appendChild(toggle);
          wrapper.appendChild(a);
          li.appendChild(wrapper);
        } else {
          // Pure group (no file)
          const groupLabel = document.createElement('span');
          groupLabel.classList.add('toc-group-label');
          groupLabel.textContent = item.name;
          groupLabel.addEventListener('click', () => li.classList.toggle('collapsed'));
          li.appendChild(groupLabel);
        }

        buildToc(item.children, li, depth + 1);
      } else if (hasPath) {
        // Leaf node (heading or standalone file)
        const a = document.createElement('a');
        a.textContent = item.name;
        a.href = '#' + item.path;
        a.dataset.file = fileFromPath(item.path);
        a.dataset.path = item.path;
        a.addEventListener('click', e => {
          e.preventDefault();
          navigateToPath(item.path);
        });
        li.appendChild(a);
      }

      ul.appendChild(li);
    }
    parent.appendChild(ul);
  }

  // --- Helpers to parse path "file.md#anchor" ---
  function fileFromPath(p) {
    const i = p.indexOf('#');
    return i > 0 ? p.substring(0, i) : p;
  }
  function anchorFromPath(p) {
    const i = p.indexOf('#');
    return i > 0 ? p.substring(i + 1) : null;
  }

  // --- Navigation ---
  function navigateToPath(path) {
    // Pause scroll-spy during programmatic navigation
    scrollSpyPaused = true;
    setTimeout(() => { scrollSpyPaused = false; }, 800);
    window.location.hash = path;
  }

  function handleHash() {
    const raw = decodeURIComponent(window.location.hash.slice(1));
    if (!raw) {
      const first = findFirstPath(tocData.toc);
      if (first) navigateToPath(first);
      return;
    }
    const file = fileFromPath(raw);
    const anchor = anchorFromPath(raw);
    loadFile(file, anchor);
  }

  function findFirstPath(items) {
    if (!Array.isArray(items)) return null;
    for (const item of items) {
      if (item.path) return item.path;
      if (item.children) {
        const found = findFirstPath(item.children);
        if (found) return found;
      }
    }
    return null;
  }

  function isPdf(file) {
    return /\.pdf$/i.test(file);
  }

  // --- File loading ---
  async function loadFile(file, anchor) {
    currentFile = file;
    updateActiveToc(file, anchor);
    updateBreadcrumb(file, anchor);

    // PDF: embed directly
    if (isPdf(file)) {
      const src = resolvePath(file) + (anchor ? '#' + anchor : '');
      contentEl.innerHTML = '<embed class="pdf-embed" src="' + escHtml(src) + '" type="application/pdf">';
      return;
    }

    if (!fileCache[file]) {
      contentEl.innerHTML = '<div id="loading"><div class="spinner"></div>Chargement...</div>';
      try {
        const resp = await fetch(resolvePath(file));
        if (!resp.ok) throw new Error(resp.status);
        fileCache[file] = await resp.text();
      } catch (e) {
        contentEl.innerHTML = '<p style="color:#f85149">Erreur : impossible de charger ' + escHtml(file) + '</p>';
        return;
      }
    }
    renderCurrentContent(anchor);
  }

  function resolvePath(file) {
    return basePath + file;
  }

  // --- Render ---
  async function renderCurrentContent(anchor) {
    const md = fileCache[currentFile];
    const renderer = new marked.Renderer();
    const defaultCode = renderer.code.bind(renderer);

    // Heading hierarchy stack for compound IDs: [ { level, slug } ]
    const headingStack = [];

    let mermaidIdx = 0;
    const mermaidBlocks = [];

    renderer.code = function({ text, lang }) {
      if (lang === 'mermaid') {
        const id = 'mmd-' + (mermaidIdx++);
        mermaidBlocks.push({ id, text });
        return '<div class="mermaid-wrapper">'
          + '<div class="mermaid-toolbar">'
          + '<button onclick="zoomMermaid(this, 1.2)" title="Zoom +">+</button>'
          + '<button onclick="zoomMermaid(this, 0.8)" title="Zoom -">&minus;</button>'
          + '<button onclick="resetZoomMermaid(this)" title="Reset">1:1</button>'
          + '<button onclick="fullscreenMermaid(this)" title="Plein ecran">&#x26F6;</button>'
          + '<button onclick="exportMermaid(this)" title="Exporter SVG">SVG</button>'
          + '</div>'
          + '<div class="mermaid-viewport" data-zoom="1"><div class="mermaid" id="' + id + '">' + escHtml(text) + '</div></div>'
          + '</div>';
      }
      return defaultCode({ text, lang });
    };

    // Headings: hierarchical compound IDs (parent/child) for disambiguation
    renderer.heading = function({ text, depth }) {
      const baseSlug = slugify(text.replace(/<[^>]*>/g, ''));
      // Pop stack back to parent level
      while (headingStack.length > 0 && headingStack[headingStack.length - 1].level >= depth) {
        headingStack.pop();
      }
      headingStack.push({ level: depth, slug: baseSlug });
      // Build compound ID: h1-slug/h2-slug/h3-slug
      const compoundId = headingStack.map(h => h.slug).join('/');
      const href = currentFile + '#' + compoundId;
      return '<h' + depth + ' id="' + escHtml(compoundId) + '">'
        + '<a class="heading-link" href="#' + escHtml(href) + '" aria-hidden="true">#</a>'
        + text
        + '</h' + depth + '>';
    };

    // Rewrite image paths relative to the current markdown file's directory
    renderer.image = function({ href, title, text }) {
      if (href && !href.match(/^https?:\/\//) && !href.startsWith('data:')) {
        href = resolveRelativeLink(href);
      }
      const titleAttr = title ? ' title="' + escHtml(title) + '"' : '';
      const altAttr = text ? ' alt="' + escHtml(text) + '"' : '';
      return '<img src="' + escHtml(href) + '"' + altAttr + titleAttr + ' style="max-width:100%">';
    };

    // Handle internal .md/.pdf links and pure anchor links
    renderer.link = function({ href, title, text }) {
      if (!href) return text;
      const titleAttr = title ? ' title="' + escHtml(title) + '"' : '';
      // Pure anchor link (#something) → same file anchor
      if (href.startsWith('#') && !href.match(/^#https?:\/\//)) {
        const anchor = href.slice(1);
        return '<a href="#' + escHtml(currentFile) + '#' + escHtml(anchor) + '"' + titleAttr + ' class="internal-link">' + text + '</a>';
      }
      // Internal .md/.pdf links — resolve relative to current file's directory
      if (href.match(/\.(md|pdf)(#.*)?$/i) && !href.match(/^https?:\/\//)) {
        const resolved = resolveRelativeLink(href);
        return '<a href="#' + escHtml(resolved) + '"' + titleAttr + ' class="internal-link">' + text + '</a>';
      }
      return '<a href="' + escHtml(href) + '"' + titleAttr + ' target="_blank" rel="noopener">' + text + '</a>';
    };

    marked.setOptions({ renderer, gfm: true, breaks: false });
    contentEl.innerHTML = marked.parse(md);

    if (mermaidBlocks.length) {
      for (const block of mermaidBlocks) {
        try {
          const { svg } = await mermaid.render(block.id + '-svg', block.text);
          const el = document.getElementById(block.id);
          if (el) el.innerHTML = svg;
        } catch (e) {
          const el = document.getElementById(block.id);
          if (el) el.innerHTML = '<pre style="color:#f85149">' + escHtml(e.message) + '</pre>';
        }
      }
    }

    contentEl.querySelectorAll('.mermaid-viewport').forEach(setupPanZoom);

    contentEl.querySelectorAll('a.internal-link').forEach(a => {
      a.addEventListener('click', e => {
        e.preventDefault();
        const href = a.getAttribute('href').replace(/^#/, '');
        const targetFile = fileFromPath(href);
        const targetAnchor = anchorFromPath(href);
        // If same file, just scroll without reloading
        if (targetFile === currentFile && targetAnchor) {
          const target = findHeadingByAnchor(targetAnchor);
          if (target) {
            // Update hash without triggering reload
            scrollSpyPaused = true;
            setTimeout(() => { scrollSpyPaused = false; }, 800);
            history.replaceState(null, '', '#' + href);
            target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            updateActiveToc(targetFile, targetAnchor);
            return;
          }
        }
        navigateToPath(href);
      });
    });

    // Heading anchor clicks
    contentEl.querySelectorAll('a.heading-link').forEach(a => {
      a.addEventListener('click', e => {
        e.preventDefault();
        const href = a.getAttribute('href').replace(/^#/, '');
        navigateToPath(href);
      });
    });

    if (anchor) {
      requestAnimationFrame(() => {
        const target = findHeadingByAnchor(anchor);
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    } else {
      $('content-wrapper').scrollTop = 0;
    }

    // Setup scroll-spy for this rendered content
    setupScrollSpy();
  }

  // --- Scroll-spy: sync TOC highlight as user scrolls ---
  let scrollSpyRaf = null;
  let scrollSpyPaused = false;

  function setupScrollSpy() {
    const wrapper = $('content-wrapper');
    wrapper.removeEventListener('scroll', onContentScroll);
    wrapper.addEventListener('scroll', onContentScroll, { passive: true });
  }

  function onContentScroll() {
    if (scrollSpyPaused || !currentFile) return;
    if (scrollSpyRaf) return; // throttle
    scrollSpyRaf = requestAnimationFrame(() => {
      scrollSpyRaf = null;
      const headings = contentEl.querySelectorAll('h1[id],h2[id],h3[id],h4[id],h5[id],h6[id]');
      if (!headings.length) return;

      const wrapperTop = $('content-wrapper').getBoundingClientRect().top;
      let active = headings[0];
      for (const h of headings) {
        if (h.getBoundingClientRect().top - wrapperTop <= 20) {
          active = h;
        } else {
          break;
        }
      }

      const compoundId = active.id;
      const fullPath = currentFile + '#' + compoundId;
      highlightTocLink(fullPath);
      // Update hash silently
      history.replaceState(null, '', '#' + fullPath);
      updateBreadcrumb(currentFile, compoundId);
    });
  }

  // Lightweight TOC highlight: only moves .active class + ensures visibility, no collapse/expand
  function highlightTocLink(fullPath) {
    const prev = tocEl.querySelector('a.active');
    if (prev && prev.dataset.path === fullPath) return; // no change

    tocEl.querySelectorAll('a.active').forEach(a => a.classList.remove('active'));

    // Find exact match
    let link = tocEl.querySelector('a[data-path="' + CSS.escape(fullPath) + '"]');
    if (!link) {
      // Fallback: find by file only (for headings not in toc.json)
      const file = fileFromPath(fullPath);
      tocEl.querySelectorAll('a').forEach(a => {
        if (a.dataset.file === file && !a.dataset.path.includes('#')) {
          link = a;
        }
      });
    }
    if (link) {
      link.classList.add('active');
      // Ensure parent groups are expanded
      let parent = link.closest('.toc-group');
      while (parent) {
        if (parent.classList.contains('collapsed')) {
          parent.classList.remove('collapsed');
          const toggle = parent.querySelector(':scope > div > .toc-group-toggle');
          if (toggle) toggle.style.transform = '';
        }
        parent = parent.parentElement.closest('.toc-group');
      }
      // Scroll TOC to keep active link visible
      link.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }
  }

  // --- TOC active state (full, used on navigation clicks) ---
  function updateActiveToc(file, anchor) {
    const fullPath = anchor ? file + '#' + anchor : file;

    // Collapse all document-level groups (those with a toggle)
    tocEl.querySelectorAll('.toc-group').forEach(g => {
      const toggle = g.querySelector(':scope > div > .toc-group-toggle');
      if (toggle) {
        g.classList.add('collapsed');
        toggle.style.transform = 'rotate(-90deg)';
      }
    });

    // Update active link
    tocEl.querySelectorAll('a').forEach(a => {
      const isActive = a.dataset.path === fullPath || (!anchor && a.dataset.file === file && !a.dataset.path.includes('#'));
      a.classList.toggle('active', isActive);
    });

    // Expand path to the active link
    const activeLink = tocEl.querySelector('a.active');
    if (activeLink) {
      let parent = activeLink.closest('.toc-group');
      while (parent) {
        parent.classList.remove('collapsed');
        const toggle = parent.querySelector(':scope > div > .toc-group-toggle');
        if (toggle) toggle.style.transform = '';
        parent = parent.parentElement.closest('.toc-group');
      }
    }
  }

  function updateBreadcrumb(file, anchor) {
    const label = findBreadcrumb(tocData.toc, file, anchor, []);
    breadcrumb.textContent = label || file;
  }

  function findBreadcrumb(items, file, anchor, path) {
    if (!Array.isArray(items)) return null;
    const fullPath = anchor ? file + '#' + anchor : file;
    for (const item of items) {
      if (item.path === fullPath) return [...path, item.name].join(' > ');
      if (item.path === file && !anchor) return [...path, item.name].join(' > ');
      if (item.children) {
        const found = findBreadcrumb(item.children, file, anchor, [...path, item.name]);
        if (found) return found;
      }
    }
    return null;
  }

  // --- Pan & Zoom on mermaid ---
  function setupPanZoom(viewport) {
    let isPanning = false;
    let startX, startY, scrollLeft, scrollTop;

    viewport.addEventListener('mousedown', e => {
      if (e.target.closest('button')) return;
      isPanning = true;
      startX = e.pageX - viewport.offsetLeft;
      startY = e.pageY - viewport.offsetTop;
      scrollLeft = viewport.scrollLeft;
      scrollTop = viewport.scrollTop;
    });
    viewport.addEventListener('mouseleave', () => isPanning = false);
    viewport.addEventListener('mouseup', () => isPanning = false);
    viewport.addEventListener('mousemove', e => {
      if (!isPanning) return;
      e.preventDefault();
      viewport.scrollLeft = scrollLeft - (e.pageX - viewport.offsetLeft - startX);
      viewport.scrollTop = scrollTop - (e.pageY - viewport.offsetTop - startY);
    });

    viewport.addEventListener('wheel', e => {
      if (!e.ctrlKey) return;
      e.preventDefault();
      const svg = viewport.querySelector('svg');
      if (!svg) return;
      let z = parseFloat(viewport.dataset.zoom) || 1;
      z += e.deltaY < 0 ? 0.1 : -0.1;
      z = Math.max(0.3, Math.min(3, z));
      viewport.dataset.zoom = z;
      svg.style.transform = 'scale(' + z + ')';
    }, { passive: false });
  }

  // --- Mermaid toolbar (global functions) ---
  window.zoomMermaid = function(btn, factor) {
    const vp = btn.closest('.mermaid-wrapper').querySelector('.mermaid-viewport');
    const svg = vp.querySelector('svg');
    if (!svg) return;
    let z = parseFloat(vp.dataset.zoom) || 1;
    z = Math.max(0.3, Math.min(3, z * factor));
    vp.dataset.zoom = z;
    svg.style.transform = 'scale(' + z + ')';
  };

  window.resetZoomMermaid = function(btn) {
    const vp = btn.closest('.mermaid-wrapper').querySelector('.mermaid-viewport');
    const svg = vp.querySelector('svg');
    if (!svg) return;
    vp.dataset.zoom = 1;
    svg.style.transform = 'scale(1)';
  };

  window.fullscreenMermaid = function(btn) {
    const svg = btn.closest('.mermaid-wrapper').querySelector('svg');
    if (!svg) return;
    overlayContent.innerHTML = '';
    overlayContent.appendChild(svg.cloneNode(true));
    overlay.classList.add('visible');
  };

  window.exportMermaid = function(btn) {
    const svg = btn.closest('.mermaid-wrapper').querySelector('svg');
    if (!svg) return;
    const data = new XMLSerializer().serializeToString(svg);
    const blob = new Blob([data], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'diagramme.svg';
    a.click();
    URL.revokeObjectURL(url);
  };

  // --- Utilities ---
  function slugify(str) {
    return str.toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/(^-|-$)/g, '');
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Resolve a relative path against the current file's directory
  function resolveRelativeLink(href) {
    if (!href || href.match(/^https?:\/\//)) return href;
    // Strip leading ./
    href = href.replace(/^\.\//, '');
    // Absolute path: leave as-is
    if (href.startsWith('/')) return href;
    const dir = currentFile.includes('/') ? currentFile.substring(0, currentFile.lastIndexOf('/') + 1) : '';
    if (!dir) return href;
    // Split file part and anchor part
    const hashIdx = href.indexOf('#');
    const filePart = hashIdx >= 0 ? href.substring(0, hashIdx) : href;
    const anchorPart = hashIdx >= 0 ? href.substring(hashIdx) : '';
    // Prepend dir if the file part doesn't already include the directory
    if (filePart && !filePart.startsWith(dir)) {
      return dir + filePart + anchorPart;
    }
    return href;
  }

  // Strip leading number prefixes like "6-", "12-" for fuzzy heading match
  function stripNumPrefix(s) { return s.replace(/^\d+-/, ''); }

  // Find a heading element by anchor slug (exact, endsWith, fuzzy)
  function findHeadingByAnchor(anchor) {
    if (!anchor) return null;
    // 1. Exact match
    let target = document.getElementById(anchor);
    if (target) return target;
    // 2. Slugified exact match
    const slug = slugify(anchor);
    target = document.getElementById(slug);
    if (target) return target;
    // 3. endsWith match on compound IDs
    const headings = contentEl.querySelectorAll('h1[id],h2[id],h3[id],h4[id],h5[id],h6[id]');
    for (const h of headings) {
      const lastPart = h.id.split('/').pop();
      if (lastPart === slug || h.id.endsWith('/' + slug)) return h;
    }
    // 4. Fuzzy: strip number prefixes, compare
    const strippedSlug = stripNumPrefix(slug);
    for (const h of headings) {
      const lastPart = stripNumPrefix(h.id.split('/').pop());
      if (lastPart === strippedSlug) return h;
    }
    // 5. Fuzzy: check if one contains the other (handles l'analyse vs lanalyse)
    for (const h of headings) {
      const lastPart = stripNumPrefix(h.id.split('/').pop());
      if (lastPart.includes(strippedSlug) || strippedSlug.includes(lastPart)) return h;
    }
    return null;
  }

  // --- Start ---
  init();
})();
</script>
</body>
</html>
