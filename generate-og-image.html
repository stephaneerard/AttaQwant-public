<!DOCTYPE html>
<html>
<head><title>Generate OG Image</title></head>
<body style="background:#000;display:flex;flex-direction:column;align-items:center;padding:40px;font-family:sans-serif;color:#fff">
<p>Clic droit sur l'image ci-dessous > "Enregistrer l'image sous..." > <strong>og-image.png</strong></p>
<canvas id="c" width="1200" height="630" style="border:1px solid #333;max-width:100%"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const img = new Image();
img.onload = () => {
  ctx.drawImage(img, 0, 0, 1200, 630);
};
img.src = 'og-image.svg';
</script>
</body>
</html>
